services:
  telegram-bot-api:
    image: aiogram/telegram-bot-api:latest
    container_name: telegram-bot-api
    restart: unless-stopped
    env_file:
      - .env
    command:
      - --api-id=${TELEGRAM_API_ID}
      - --api-hash=${TELEGRAM_API_HASH}
      - --local
      - --http-port=8081
      - --dir=/var/lib/telegram-bot-api
      - --verbosity=1
    ports:
      - "${TELEGRAM_LOCAL_API_PORT:-8081}:8081"
      - "8082:8082"
    volumes:
      - ${TELEGRAM_LOCAL_HOST_FILE_ROOT:-./telegram-bot-api-data}:/var/lib/telegram-bot-api

  victoria-metrics:
    image: victoriametrics/victoria-metrics:latest
    container_name: victoria-metrics
    restart: unless-stopped
    command:
      - --storageDataPath=/victoria-metrics-data
      - --httpListenAddr=:8428
      - --promscrape.config=/etc/victoriametrics/prometheus.yml
    ports:
      - "${VICTORIA_METRICS_PORT:-8428}:8428"
    volumes:
      - ${VICTORIA_METRICS_DATA_DIR:-./victoria-metrics-data}:/victoria-metrics-data
      - ./infra/monitoring/prometheus.yml:/etc/victoriametrics/prometheus.yml:ro

  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    restart: unless-stopped
    depends_on:
      - victoria-metrics
    environment:
      - GF_SECURITY_ADMIN_USER=${GRAFANA_ADMIN_USER:-admin}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD:-admin}
      - GF_USERS_ALLOW_SIGN_UP=false
    ports:
      - "${GRAFANA_PORT:-3000}:3000"
    volumes:
      - ${GRAFANA_DATA_DIR:-./grafana-data}:/var/lib/grafana
      - ./infra/monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./infra/monitoring/grafana/dashboards:/etc/grafana/dashboards:ro
