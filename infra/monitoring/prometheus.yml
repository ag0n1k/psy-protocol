global:
  scrape_interval: 15s
  scrape_timeout: 10s

scrape_configs:
  - job_name: "synology"
    static_configs:
      - targets: ["172.17.0.1:9100"]
        labels:
          instance: "synology-nas"
  - job_name: telegram-bot-api
    metrics_path: /metrics
    static_configs:
      - targets:
          - telegram-bot-api:8082